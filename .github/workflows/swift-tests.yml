name: Swift Tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: swift test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Run tests
        run: swift test --package-path tests/swift-tests

  build-app:
    name: xcodebuild (md-preview)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build app target
        run: |
          xcodebuild \
            -project md-preview.xcodeproj \
            -scheme md-preview \
            -configuration Debug \
            build \
            CODE_SIGNING_ALLOWED=NO \
            > build.log 2>&1

      - name: Fail on warnings in our sources
        run: |
          matches=$(grep -E 'md-preview/.*: (warning|error):' build.log | grep -v 'metadata-tool' || true)
          if [ -n "$matches" ]; then
            echo "::error::Swift warnings or errors found in md-preview sources:"
            echo "$matches"
            exit 1
          fi

  # Placeholder: enable when md-previewTests target exists.
  xcode-test:
    name: xcodebuild test (md-preview)
    if: false
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Run Xcode tests
        run: >
          xcodebuild
          -project md-preview.xcodeproj
          -scheme md-preview
          -configuration Debug
          test
          CODE_SIGNING_ALLOWED=NO
